[project]
name = "squad0"
repo = "github.com/JR-G/squad0"
target_repo = "github.com/JR-G/makebook"

[linear]
team_id = "253f49a0-1b89-4553-8efc-5dba439a4e6d"
project_id = ""
workspace = "jamesrg"

[slack]
bot_token_env = "SLACK_BOT_TOKEN"
app_token_env = "SLACK_APP_TOKEN"
[slack.channels]
commands = "C0ANVV4HT08"
engineering = "C0AMY8QM9GV"
feed = "C0AML7VJLMD"
reviews = "C0ANVV5MY9W"
standup = "C0AMZKGP8LE"
triage = "C0AN1M555FC"
chitchat = "C0ANYT4845R"

[github]
owner = "JR-G"

[embeddings]
provider = "ollama"
model = "nomic-embed-text"
ollama_url = "http://localhost:11434"

[agents]
max_parallel = 3
cooldown_seconds = 30
ticket_batch_size = 3
personality_regen_every = 20
codex_fallback_model = "gpt-5-codex"

[agents.models]
pm = "claude-sonnet-4-6"
tech_lead = "claude-sonnet-4-6"
engineer = "claude-sonnet-4-6"
reviewer = "claude-sonnet-4-6"
designer = "claude-sonnet-4-6"

[agents.runtime]
default = "claude"
fallback = "codex"

[quality]
lint = "golangci-lint run"
test = "go test -race ./..."
coverage_threshold = 95

[rituals]
standup_cron = "0 9 * * *"
retro_after_tickets = 10
design_discussion_on_epics = true

[worktree]
base_dir = ".worktrees"
auto_cleanup = true
